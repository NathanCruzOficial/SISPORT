<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Cruz - Controle de Visitantes" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">Cruz • Controle de Visitantes</div>
    <nav class="nav">
      <a href="{{ url_for('visitor.identify') }}">Novo cadastro</a>
      <a href="{{ url_for('visitor.open_visits') }}">Em aberto</a>
      <a href="{{ url_for('visitor.report_today') }}">Relatório de hoje</a>
      <a href="{{ url_for('visitor.report_today_print') }}">Imprimir hoje</a>

    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, msg in messages %}
            <div class="flash {{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/wizard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/camera.js') }}"></script>

  <script>
  window.initCameraBlocks && window.initCameraBlocks();
  </script>

</body>
</html>
