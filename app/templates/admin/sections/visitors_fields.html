<!-- app/templates/admin/sections/visitors_fields.html -->
<form method="post" action="{{ url_for('admin.save_visitors') }}">
  {# Preserva categorias (usa a versão raw, que é string) #}
  <input type="hidden" name="categories_list"
         value="{{ settings.visitor_categories_raw | default('') }}">

  <p class="text-muted small mb-3">
    Defina quais campos são obrigatórios no cadastro de visitantes.
  </p>

  <div class="d-flex flex-column gap-2">
    <div class="form-check">
      <input type="checkbox" name="father_name_required" class="form-check-input" id="fatherReq"
             {{ 'checked' if settings.visitor_father_name_required }}>
      <label class="form-check-label" for="fatherReq">Nome do Pai</label>
    </div>
    <div class="form-check">
      <input type="checkbox" name="email_required" class="form-check-input" id="emailReq"
             {{ 'checked' if settings.visitor_email_required }}>
      <label class="form-check-label" for="emailReq">E-mail</label>
    </div>
    <div class="form-check">
      <input type="checkbox" name="empresa_required" class="form-check-input" id="empresaReq"
             {{ 'checked' if settings.visitor_empresa_required }}>
      <label class="form-check-label" for="empresaReq">Empresa</label>
    </div>
  </div>

  <div class="mt-3 text-end">
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-check-lg me-1"></i>Salvar
    </button>
  </div>
</form>
