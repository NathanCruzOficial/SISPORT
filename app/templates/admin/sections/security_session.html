<form method="post" action="{{ url_for('settings.save_tab', tab_key='security') }}">
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <label class="form-label fw-semibold small">Timeout de Sessão (minutos)</label>
      <input type="number" name="timeout_minutes" class="form-control" min="5" max="480"
             value="{{ settings.security.session.timeout_minutes }}">
      <div class="form-text">Tempo de inatividade antes de exigir nova autenticação.</div>
    </div>
    <div class="col-12">
      <div class="form-check">
        <input type="checkbox" name="require_password_for_delete" class="form-check-input" id="reqPwDelete"
               {{ 'checked' if settings.security.session.require_password_for_delete }}>
        <label class="form-check-label" for="reqPwDelete">
          Exigir senha de administrador para excluir visitantes
        </label>
      </div>
    </div>
  </div>
  <div class="mt-3 text-end">
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-check-lg me-1"></i>Salvar
    </button>
  </div>
</form>
