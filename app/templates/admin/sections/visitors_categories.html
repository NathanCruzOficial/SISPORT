<form method="post" action="{{ url_for('admin.save_visitors') }}">
  <div class="mb-2">
    <label class="form-label fw-semibold small">Categorias de Visitante</label>
    <textarea name="visitor_categories" class="form-control font-monospace"
              rows="4" placeholder="Uma por linha ou separadas por vírgula">{{ settings.visitor_categories_raw }}</textarea>
    <div class="form-text">Separadas por vírgula ou uma por linha. Ex: civil, militar, ex-militar, prestador</div>
  </div>

  <div class="d-flex flex-wrap gap-1 mb-3">
    {% for cat in settings.visitor_categories %}
    <span class="badge text-bg-secondary">{{ cat }}</span>
    {% endfor %}
  </div>

  <div class="text-end">
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-check-lg me-1"></i>Salvar
    </button>
  </div>
</form>
