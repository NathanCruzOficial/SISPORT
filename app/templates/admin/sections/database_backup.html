<div class="text-muted small mb-3">
  Crie uma cópia de segurança completa do banco de dados SQLite.
  Inclui visitantes, visitas, configurações — tudo.
</div>

<div class="d-flex flex-column flex-md-row gap-3 align-items-md-center">
  <div class="d-flex align-items-center gap-2 flex-fill">
    <i class="bi bi-database-down fs-4 text-primary"></i>
    <div>
      <div class="fw-semibold small">Backup Completo</div>
      <div class="text-muted small">Gera um arquivo <code>.db</code> com todos os registros do sistema.</div>
    </div>
  </div>

  <form method="post" action="{{ url_for('admin.create_backup') }}">
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-download me-1"></i>Baixar Backup
    </button>
  </form>
</div>

<div class="alert alert-warning small mt-3 mb-0">
  <i class="bi bi-exclamation-triangle me-1"></i>
  <strong>Dica:</strong> Faça backups regulares, especialmente antes de atualizar o sistema
  ou executar limpeza de retenção.
</div>
