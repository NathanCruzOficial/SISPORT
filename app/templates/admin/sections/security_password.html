<form method="post" action="{{ url_for('admin.change_password') }}">
  <div class="row g-3">
    {% if settings.has_admin_password %}
    <div class="col-12 col-md-4">
      <label class="form-label fw-semibold small">Senha Atual</label>
      <input type="password" name="current_password" class="form-control" required>
    </div>
    {% else %}
    <div class="col-12">
      <div class="alert alert-warning small py-2 mb-0">
        <i class="bi bi-exclamation-triangle me-1"></i>
        Nenhuma senha definida. Defina uma senha para proteger ações administrativas.
      </div>
    </div>
    {% endif %}

    <div class="col-12 col-md-4">
      <label class="form-label fw-semibold small">Nova Senha</label>
      <input type="password" name="new_password" class="form-control"
             required minlength="4" placeholder="Mínimo 4 caracteres">
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label fw-semibold small">Confirmar Nova Senha</label>
      <input type="password" name="confirm_password" class="form-control"
             required minlength="4">
    </div>
  </div>

  <div class="alert alert-info small mt-3 mb-0">
    <i class="bi bi-info-circle me-1"></i>
    A senha é armazenada com hash seguro no banco de dados.
    Ela <strong>não</strong> é incluída na exportação de configurações.
  </div>

  <div class="mt-3 text-end">
    <button type="submit" class="btn btn-warning btn-sm">
      <i class="bi bi-key me-1"></i>
      {% if settings.has_admin_password %}Alterar Senha{% else %}Definir Senha{% endif %}
    </button>
  </div>
</form>
